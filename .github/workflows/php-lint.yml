name: Vérification PHP

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  php-lint:
    name: Syntaxe PHP
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php-version:
          - "8.1"
          - "8.2"
          - "8.3"

    steps:
      - name: Récupération du dépôt
        uses: actions/checkout@v4

      - name: Installation de PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none

      - name: Vérification des fichiers PHP
        shell: bash
        run: |
          set -euo pipefail

          mapfile -d '' php_files < <(
            find . \
              -type f \
              -name '*.php' \
              -not -path './.git/*' \
              -print0
          )

          if [ "${#php_files[@]}" -eq 0 ]; then
            echo "Aucun fichier PHP trouvé."
            exit 0
          fi

          for file in "${php_files[@]}"; do
            echo "Vérification de ${file}"
            php -l "${file}"
          done
